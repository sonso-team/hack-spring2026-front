services:
  game:
    build:
      context: ./apps/game
      dockerfile: Dockerfile
    ports:
      - "5000:80"
    networks:
      - front
    restart: unless-stopped

  admin:
    build:
      context: ./apps/admin-panel
      dockerfile: Dockerfile
    ports:
      - "5001:80"
    networks:
      - front
    restart: unless-stopped

networks:
  front:
   external: true